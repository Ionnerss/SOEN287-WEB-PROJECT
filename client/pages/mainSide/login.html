<!doctype html>
<html lang="en">
  <head>
    <!-- Standard metadata for character encoding and responsive layout -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Browser tab title -->
    <title>Log In • Smart Course Companion</title>

    <!-- Shared styles: base reset, reusable components, then page layout -->
    <link rel="stylesheet" href="../../css/base.css" />
    <link rel="stylesheet" href="../../css/components.css" />
    <link rel="stylesheet" href="../../css/layout.css" />
  </head>

  <body>
    <!-- Header: brand + quick navigation to sign up -->
    <header>
      <div class="container">
        <a href="/" class="site-logo">LearnFlow</a>
        <nav>
          <a href="./signup.html" class="action-button">Sign Up</a>
        </nav>
      </div>
    </header>

    <!-- Main: hero shell reused from landing page, with auth card content -->
    <main>
      <section class="hero">
        <!-- Decorative background layer shown behind auth content -->
        <div class="grid-wrapper">
          <div class="grid-background"></div>
        </div>

        <!-- Foreground content container -->
        <div class="container">
          <!-- Login panel/card -->
          <div class="auth-panel">
            <h1>Log In</h1>
            <p class="auth-subtext">Access your courses, assessments, and progress.</p>

            <!-- Hidden error box toggled by validation/auth logic -->
            <div class="auth-error" id="errorBox" hidden>Invalid email or password.</div>

            <!-- Login form with browser validation hints -->
            <form id="loginForm" class="auth-form" novalidate>
              <!-- Email -->
              <label class="auth-field">
                <span>Email</span>
                <input
                  id="email"
                  class="auth-input"
                  type="email"
                  name="email"
                  placeholder="name@example.com"
                  autocomplete="email"
                  required
                />
                <small id="emailHint" hidden>Please enter a valid email.</small>
              </label>

              <!-- Password -->
              <label class="auth-field">
                <span>Password</span>
                <input
                  id="password"
                  class="auth-input"
                  type="password"
                  name="password"
                  placeholder="••••••••"
                  autocomplete="current-password"
                  minlength="6"
                  required
                />
                <small id="passHint" hidden
                  >Password must be at least 6 characters.</small
                >
              </label>

              <!-- Primary action button -->
              <button class="action-button action-button--full" type="submit">
                Log In
              </button>
            </form>

            <!-- Secondary navigation for new users -->
            <p class="auth-subtext auth-subtext--small">
              No account? <a href="./signup.html">Create one</a>
            </p>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer: project attribution -->
    <footer>
      <div class="container">
        <p>&copy; 2026 • SOEN 287 • WeUpp!</p>
      </div>
    </footer>
  </body>
</html>
