<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage Courses</title>
</head>
<body>

<main>
  <h2>Manage Courses</h2>

  <a href="add-course.html">
    <button>Add New Course</button>
  </a>

  <a href="dashboard.html">
    <button>Back to Dashboard</button>
  </a>

  <table>
    <thead>
      <tr>
        <th>Course Code</th>
        <th>Course Name</th>
        <th>Instructor</th>
        <th>Term</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>SOEN 287</td>
        <td>Web Programming</td>
        <td>Dr. Admin</td>
        <td>Winter 2026</td>
        <td>Enabled</td>
        <td>
          <a href="edit-course.html">
            <button>Edit</button>
          </a>
          <button onclick="confirm('Are you sure you want to disable SOEN 287 - Web Programming?')">Disable</button>
          <button onclick="confirm('Are you sure you want to delete SOEN 287 - Web Programming?')">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <table>
    <thead>
      <tr>
        <th>Course Code</th>
        <th>Course Name</th>
        <th>Instructor</th>
        <th>Term</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>COMP 248</td>
        <td>Object Oriented Programming</td>
        <td>Dr. Admin</td>
        <td>Winter 2026</td>
        <td>Disabled</td>
        <td>
          <a href="edit-course.html">
            <button>Edit</button>
          </a>
          <button onclick="confirm('Are you sure you want to enable COMP 248 - Object Oriented Programming?')">Enable</button>
          <button onclick="confirm('Are you sure you want to delete COMP 248 - Object Oriented Programming?')">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</main>

</body>
</html>
