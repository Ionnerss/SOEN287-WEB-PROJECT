  <style>

    main {
      text-align: center;
      margin-top: 24px;
      color: #800020
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      color: #800020;
    }
    

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    footer {
      background-color: #800020;
      color: white;
      text-align: center;
      padding: 16px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }

    nav ul {
        list-style: none;
        padding: 0;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
      }

    nav ul li a {
        display: inline-block;
        text-decoration: none;
        background-color: #ccc;
        color: #333;
        padding: 10px 20px;
        border-radius: 8px;
        font-weight: bold;
        border: 1px solid #ccc;
        box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
        transition: background-color 0.5s ease, color 0.5s ease;
      }

    nav ul li a:hover {
        background-color:#800020;
        color: white;
      }

      .logout-btn {
        text-decoration: none;
        background-color: #e8e8e8;
        color: #111;
        padding: 10px 24px;
        border-radius: 12px;
        font-weight: bold;
        border: 1px solid #ccc;
        box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
        transition: background-color 0.5s ease, color 0.5s ease;
    }

      .logout-btn:hover {
        background-color: #7a0020;
        color: white;
        border-color: #7a0020;
    }

    body {
      background-color: #f5f5f5;
      background-image:
      linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* From Uiverse.io by SteveBloX */ 
.card {
  box-sizing: border-box;
  width: 190px;
  height: 254px;
  background: rgba(217, 217, 217, 0.58);
  border: 1px solid white;
  box-shadow: 12px 17px 51px rgba(0, 0, 0, 0.22);
  backdrop-filter: blur(6px);
  border-radius: 17px;
  text-align: center;
  cursor: pointer;
  transition: all 0.5s;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  font-weight: bolder;
  color: black;
  justify-content: center;

}

.card:hover {
  border: 1px solid black;
  background-color: #800020;
  color: white;
  transform: scale(1.05);
}

.card:active {
  transform: scale(0.95) rotateZ(1.7deg);
}

.card ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.card ul li {
  margin-bottom: 12px;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  flex: 1;
}



  </style>
