<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage SOEN 287</title>
</head>
<body>

<main>
    <h2>Manage SOEN 287</h2>

    <form action="assessments.html" method="get">
        <div>
            <label for="assignments">Assignments Weight:</label>
            <input type="number" id="assignments" name="assignments" required>
        </div>

        <div>
            <label for="midterm">Midterm Weight:</label>
            <input type="number" id="midterm" name="midterm" required>
        </div>

        <div>
            <label for="final">Final Weight:</label>
            <input type="number" id="final" name="final" required>
        </div>
        
        <button type="submit">Update</button>
    </form>

    <div>
        <button onclick="if(confirm('Are you sure you want to delete Assignment?')) window.location.href='assessments.html'">Delete Assignment</button>
        <button onclick="if(confirm('Are you sure you want to delete Midterm?')) window.location.href='assessments.html'">Delete Midterm</button>
        <button onclick="if(confirm('Are you sure you want to delete Final?')) window.location.href='assessments.html'">Delete Final</button>
    </div>

    <a href="courses.html">
        <button>Back</button>
    </a>
</main>

</body>
</html>
